name: honduras_transit_gtfs
description: "A Flutter app for offline GTFS transit planning in Honduras"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0  # Used for mapping and offline-capable map rendering
  latlong2: ^0.9.0     # Coordinate system used by flutter_map

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/gtfs/  # Place GTFS CSV files here for offline mode
